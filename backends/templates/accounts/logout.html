{% extends 'base.html' %}
{% block title %}Inscription{% endblock %}
{% block content %}


<div>
    form method="post" class="space-y-5">
        {% csrf_token %}
        <div class="text-center py-16">
            <h1 class="font-display text-3xl font-700 text-gray-900 mb-2">Déconnexion</h1>
            <p class="text-gray-500 mb-8">Êtes-vous sûr de vouloir vous déconnecter ?</p>
            <button type="submit" class="btn-primary px-6 py-2 rounded-lg text-white font-semibold hover:bg-brand-600 transition-colors">Se déconnecter</button>
            <a href="{% url 'core:home' %}" class="ml-4 text-gray-500 hover:text-gray-700 transition-colors">Annuler</a>
        </div>
</div>

{% endblock%}
